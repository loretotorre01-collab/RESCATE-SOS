é de Patata y Calabaza",description:"Proteína marina de máxima asimilación con un puré reconfortante y rico en mucílagos que calman la mucosa.",image:"https://lh3.googleusercontent.com/aida-public/AB6AXuA-3o_hS2Z-vE_Xp4rWqU_u_v_w_x_y_z_0_1_2_3_4_5_6_7_8_9_A_B_C_D_E_F",protein:{label:"Pescado Blanco",icon:"Fish"},ingredients:["150g de filete de pescado blanco limpio (merluza, lenguado o bacalao fresco)","1 patata mediana (aprox. 150g), pelada y troceada","120g de calabaza dulce madura, pelada y sin semillas","1 cucharada sopera de aceite de oliva virgen extra de primera presión","Una pizca de sal marina","Unas hojitas de eneldo fresco picado (excelente digestivo)"],steps:[{title:"1. Cocinar los Tubérculos",text:"Corta los 150g de patata y los 120g de calabaza en trozos medianos y homogéneos. Colócalos en una olla al vapor o hiérvelos en abundante agua con una pizca de sal marina durante 15 minutos, hasta que puedas pincharlos con facilidad."},{title:"2. Vapor del Pescado",text:"Coloca el filete de pescado blanco (150g) directamente encima de las verduras en la vaporera (o usa un colador metálico sobre la olla con las verduras hirviendo). Tapa bien y cocina al vapor suave durante 6 a 8 minutos, hasta que las lascas se separen de forma natural."},{title:"3. Elaboración del Puré Sedoso",text:"Retira la patata y la calabaza cocidas. Colócalas en un cuenco hondo y aplástalas con un tenedor o pasapurés. Añade la cucharada de aceite de oliva virgen extra y de 2 a 3 cucharadas del caldo sobrante para lograr una consistencia cremosa, suave y libre de grumos."},{title:"4. Emplatar y Sazonar",text:"Extiende el puré templado de patata y calabaza en un plato plano. Dispón encima el pescado blanco desmenuzado y espolvorea un poco de eneldo fresco para aliviar los gases. Consume templado de inmediato."}]},arroz_zanahoria_patata:{id:"arroz_zanahoria_patata",title:"Sopa Crema de Arroz con Zanahoria y Patata",description:"La opción clásica más blanda y astringente para combatir la aci
